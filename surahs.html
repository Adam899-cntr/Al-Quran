<script>
const input=document.getElementById("search");

input.addEventListener("keyup",()=>{

const value=input.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

card.style.display=
card.innerText.toLowerCase().includes(value)
?"block":"none";

});

});
</script>
