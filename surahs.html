<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Все суры</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
<h1>📖 Все суры</h1>
<p>Священный Коран</p>
</header>

<div class="search">
<input id="search" type="text" placeholder="🔍 Поиск суры...">
</div>

<div id="surah-list" class="cards"></div>

<script>
fetch("data/surahs.json")
.then(response => response.json())
.then(surahs => {

const list = document.getElementById("surah-list");

surahs.forEach(surah => {

list.innerHTML += `
<a class="card" href="surah.html?id=${surah.number}">
<div class="emoji">${surah.number}</div>
<h2>${surah.arabic}</h2>
<p>${surah.russian}</p>
<p>${surah.verses} аятов</p>
</a>
`;

});

const search=document.getElementById("search");

search.onkeyup=()=>{

const value=search.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

card.style.display=
card.innerText.toLowerCase().includes(value)
?"block":"none";

});

};

});
</script>

</body>
</html>
